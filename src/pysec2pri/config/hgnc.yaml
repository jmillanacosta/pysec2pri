# Historical distribution eras. HGNC has lived at several locations over time
# (see wayback_hgnc/wayback_hgnc.sh); this is the most recently confirmed
# pre-GCS one. Declarative only for now: no downloader resolves it yet, and
# the URLs are no longer live (Wayback Machine fetching is a follow-up).
distribution_eras:
  - id: ebi_hgnc_ftp
    to_version: "2023-12-31"
    wayback: true
    download_urls:
      complete: "https://ftp.ebi.ac.uk/pub/databases/genenames/hgnc/tsv/hgnc_complete_set.txt"
      withdrawn: "https://ftp.ebi.ac.uk/pub/databases/genenames/hgnc/tsv/withdrawn.txt"

primary_file_key: "withdrawn"
archive_url: "https://storage.googleapis.com/public-download-files/hgnc/tsv/tsv/"
id_pattern: "^HGNC:\\d+$"
default_output_filename: "hgnc_sec2pri.sssom.tsv"

mapping_sets:
  ids:
    method: parse
    primary_input: withdrawn
    required_inputs: [withdrawn, complete]
    formats: [sssom, sec2pri, pri_ids, secondary, rdf, json, owl, all]
  labels:
    method: parse_symbols
    primary_input: complete
    required_inputs: [complete]
    formats: [sssom, label_sec2pri, name2synonym, pri_labels, rdf, json, owl, all]
input_file_types:
  - hgnc_complete_set.txt
  - withdrawn.txt

source: "HGNC database"
homepage: "https://www.genenames.org/"
data_license: "https://www.genenames.org/about/license"
