# VGNC has no versioned/quarterly archive (verified: the GCS bucket's vgnc/
# prefix contains only "latest" snapshots, no date-stamped or archive/
# directories) -- these always resolve to the current files, and the
# generic Last-Modified fallback in pysec2pri.download resolves the release
# date from the file itself (confirmed it matches the GCS object's own
# `updated` timestamp).
download_urls:
  complete: "https://storage.googleapis.com/public-download-files/vgnc/tsv/all/all_vgnc_gene_set_All.tsv"
  withdrawn: "https://storage.googleapis.com/public-download-files/vgnc/tsv/all/all_vgnc_withdrawn.tsv"

primary_file_key: "withdrawn"
archive_url: null
id_pattern: "^VGNC:\\d+$"
default_output_filename: "vgnc_sec2pri.sssom.tsv"

mapping_sets:
  ids:
    method: parse
    primary_input: withdrawn
    required_inputs: [withdrawn, complete]
    formats: [sssom, sec2pri, pri_ids, secondary, rdf, json, owl, all]
  labels:
    method: parse_labels
    primary_input: complete
    required_inputs: [complete]
    formats: [sssom, label_sec2pri, name2synonym, pri_labels, rdf, json, owl, all]

input_file_types:
  - all_vgnc_gene_set_All.tsv
  - all_vgnc_withdrawn.tsv

source: "VGNC database"
homepage: "https://vertebrate.genenames.org/"
data_license: "https://www.genenames.org/about/license/"
