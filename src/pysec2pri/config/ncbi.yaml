download_urls:
  gene_info: "https://ftp.ncbi.nih.gov/gene/DATA/gene_info.gz"
  gene_history: "https://ftp.ncbi.nih.gov/gene/DATA/gene_history.gz"

primary_file_key: "gene_history"
archive_url: null
id_pattern: "^NCBIGene:\\d+$"
default_output_filename: "ncbi_sec2pri.sssom.tsv"

mapping_sets:
  ids:
    method: parse
    primary_input: gene_history
    required_inputs: [gene_history, gene_info]
    formats: [sssom, sec2pri, pri_ids, secondary, rdf, json, owl, all]
  labels:
    method: parse_symbols
    primary_input: gene_info
    required_inputs: [gene_info]
    formats:
      [sssom, label_sec2pri, name2synonym, pri_labels, rdf, json, owl, all]

input_file_types:
  - gene_info.gz
  - gene_history.gz

source: "NCBI Gene"
homepage: "https://www.ncbi.nlm.nih.gov/gene"
data_license: "https://www.ncbi.nlm.nih.gov/home/about/policies/"

# Suggested cross-reference crosswalk source(s) for disambiguation context
# (see mapkgsutils.context.ContextSpec, kind="xref")
xref_sources:
  - id: hgnc_custom
    name: "HGNC custom download - Ensembl/Entrez/RefSeq/UniProt/etc. mappings"
    url: "https://www.genenames.org/cgi-bin/download/custom?col=gd_hgnc_id&col=gd_app_sym&col=gd_app_name&col=gd_status&col=gd_prev_sym&col=gd_pub_refseq_ids&col=md_eg_id&col=md_ensembl_id&col=md_mim_id&col=md_vega_id&col=md_refseq_id&col=md_ucsc_id&col=md_prot_id&status=Approved&status=Entry%20Withdrawn&hgnc_dbtag=on&order_by=gd_app_sym_sort&format=text&submit=submit"
    format: tsv
    object_id_col: "HGNC ID"
    object_label_col: "Approved symbol"
    subject_id_cols:
      ensembl: "Ensembl ID(supplied by Ensembl)"
      entrez: "NCBI Gene ID(supplied by NCBI)"
      refseq: "RefSeq IDs"
      uniprot: "UniProt ID(supplied by UniProt)"
    note:
      "Source of truth for cross-references varies; this is a suggested default,
      not authoritative."
