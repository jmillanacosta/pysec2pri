parse_options:
  default_assembly: "38"

# {version}: Ensembl release number. {species}: species token (see `species`
# block above). {assembly}: per-species assembly suffix, auto-discovered by
# EnsemblDownloader._resolve_core_dir (falls back to parse_options.default_assembly).
download_urls:
  stable_id_event: "https://ftp.ensembl.org/pub/release-{version}/mysql/{species}_core_{version}_{assembly}/stable_id_event.txt.gz"
  mapping_session: "https://ftp.ensembl.org/pub/release-{version}/mysql/{species}_core_{version}_{assembly}/mapping_session.txt.gz"
  gene: "https://ftp.ensembl.org/pub/release-{version}/mysql/{species}_core_{version}_{assembly}/gene.txt.gz"
  xref: "https://ftp.ensembl.org/pub/release-{version}/mysql/{species}_core_{version}_{assembly}/xref.txt.gz"
  external_synonym: "https://ftp.ensembl.org/pub/release-{version}/mysql/{species}_core_{version}_{assembly}/external_synonym.txt.gz"

primary_file_key: "stable_id_event"
archive_url: "https://ftp.ensembl.org/pub/"
id_pattern: "^ENSEMBL:ENS[A-Z]*G\\d+"
default_output_filename: "ensembl_sec2pri.sssom.tsv"

mapping_sets:
  ids:
    method: parse
    primary_input: stable_id_event
    required_inputs: [stable_id_event, mapping_session, gene]
    formats: [sssom, sec2pri, pri_ids, secondary, rdf, json, owl, all]
  labels:
    method: parse_labels
    primary_input: external_synonym
    required_inputs: [gene, xref, external_synonym]
    formats: [sssom, label_sec2pri, name2synonym, pri_labels, rdf, json, owl, all]

input_file_types:
  - stable_id_event.txt.gz
  - mapping_session.txt.gz
  - gene.txt.gz
  - xref.txt.gz
  - external_synonym.txt.gz

source: "Ensembl"
homepage: "https://www.ensembl.org"
data_license: "https://www.ensembl.org/info/about/legal/disclaimer.html"

# Suggested cross-reference crosswalk source(s) for disambiguation context
# (see pysec2pri.context.ContextSpec, kind="xref")
xref_sources:
  - id: hgnc_custom
    name: "HGNC custom download - Ensembl/Entrez/RefSeq/UniProt/etc. mappings"
    url: "https://www.genenames.org/cgi-bin/download/custom?col=gd_hgnc_id&col=gd_app_sym&col=gd_app_name&col=gd_status&col=gd_prev_sym&col=gd_pub_refseq_ids&col=md_eg_id&col=md_ensembl_id&col=md_mim_id&col=md_vega_id&col=md_refseq_id&col=md_ucsc_id&col=md_prot_id&status=Approved&status=Entry%20Withdrawn&hgnc_dbtag=on&order_by=gd_app_sym_sort&format=text&submit=submit"
    format: tsv
    object_id_col: "HGNC ID"
    object_label_col: "Approved symbol"
    subject_id_cols:
      ensembl: "Ensembl ID(supplied by Ensembl)"
      entrez: "NCBI Gene ID(supplied by NCBI)"
      refseq: "RefSeq IDs"
      uniprot: "UniProt ID(supplied by UniProt)"
    note: "Source of truth for cross-references varies; this is a suggested default, not authoritative."
