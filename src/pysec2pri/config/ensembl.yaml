# Datasource metadata
config_id: "ensembl"
datasource_id: "ensembl"
name: "Ensembl"
parser_class: "EnsemblParser"
prefix: "ENSEMBL"
curie_base_url: "http://identifiers.org/ensembl/"
entity_types: ["genes"]

# Canonical key = NCBI taxon ID. `token` is Ensembl's own species directory
# component (e.g. https://ftp.ensembl.org/pub/release-115/mysql/homo_sapiens_core_115_38/).
species:
  default: 9606
  available:
    9606: { token: homo_sapiens, label: Human }
    10090: { token: mus_musculus, label: Mouse }
    10116: { token: rattus_norvegicus, label: Rat }
    7955: { token: danio_rerio, label: Zebrafish }

