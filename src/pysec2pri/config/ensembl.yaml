# build is read straight from mapping_session (old_assembly -> subject,
# new_assembly -> object), so only the current-build defaults for the
# label/primary sets need listing here, per species under
# `species.available[<taxon>].build`. `source_url` documents how to fetch the
# exact assembly for any species/release not curated above.
genome_build:
  source_url: "https://rest.ensembl.org/info/assembly/{species}?content-type=application/json"

