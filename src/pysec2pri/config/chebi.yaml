name: "ChEBI"
parser_class: "ChEBIParser"
prefix: "CHEBI"
curie_base_url: "http://purl.obolibrary.org/obo/CHEBI_"
entity_types: ["chemical entities"]

# Compound subset: which compounds.tsv "star" filter to apply (TSV releases),
# or which legacy SDF file to use (pre-245 releases). Only ChEBI has this axis.
subset:
  default: 3star
