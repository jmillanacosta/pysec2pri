# SDF download URLs for legacy releases (< rel245)
# Use {version} as placeholder; legacy path differs from new releases
archive_url: "https://ftp.ebi.ac.uk/pub/databases/chebi/archive/"
download_urls:
  sdf_3star: "https://ftp.ebi.ac.uk/pub/databases/chebi/archive/chebi_legacy/archive/rel{version}/SDF/ChEBI_complete_3star.sdf.gz"
  sdf_complete: "https://ftp.ebi.ac.uk/pub/databases/chebi/archive/chebi_legacy/archive/rel{version}/SDF/ChEBI_complete.sdf.gz"

primary_file_key: "sdf_3star"

# Source-specific parse options
parse_options:
  default_subset: "3star"
  subsets: [3star, complete]
  input_format: "sdf"   # Signals to parser that input is SDF, not TSV directory

default_output_filename: "chebi_sdf_sec2pri.sssom.tsv"

mapping_sets:
  ids:
    method: parse
    primary_input: sdf_3star
    required_inputs: [sdf_3star]
    formats: [sssom, sec2pri, pri_ids, secondary, rdf, json, owl, all]
  labels:
    method: parse_synonyms
    primary_input: sdf_3star
    required_inputs: [sdf_3star]
    formats: [sssom, symbol_sec2pri, name2synonym, pri_symbols, rdf, json, owl, all]

source: "ChEBI database"
homepage: "https://www.ebi.ac.uk/chebi/"
data_license: "https://www.ebi.ac.uk/about/terms-of-use"
id_pattern: "^CHEBI:\\d+$"
